name: Deploy to GitHub Pages

on:
  # Tự động chạy khi bạn push code lên branch main (hoặc master)
  push:
    branches:
      - main
      - master

  # Cho phép bạn bấm nút chạy thủ công trên GitHub nếu muốn
  workflow_dispatch:

# Cấp quyền cho GitHub Actions có thể deploy lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Cho phép hủy các lần deploy cũ nếu có lần deploy mới hơn đang chạy
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 3. Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy toàn bộ thư mục gốc chứa file index.html
          path: '.'

      - name: 4. Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
