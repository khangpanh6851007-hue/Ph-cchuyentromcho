name: Deploy Game Tới GitHub Pages 🚀

on:
  push:
    branches:
      - main
      - master # Tự động chạy khi push code vào nhánh main hoặc master
  workflow_dispatch: # Cho phép bấm nút kích hoạt chạy bằng tay nếu muốn

# Thiết lập quyền hạn bảo mật tối thiểu cho GitHub Actions năm 2026
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh xung đột khi push liên tục (Hủy các tiến trình cũ chưa chạy xong)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Bước 1: Kéo mã nguồn mới nhất từ Kho về hệ thống 📂
        uses: actions/checkout@v4

      - name: Bước 2: Cấu hình môi trường GitHub Pages 🛠️
        uses: actions/configure-pages@v5

      - name: Bước 3: Nén và đóng gói các tệp tĩnh (HTML/CSS/JS) 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Chọn thư mục gốc (nơi chứa index.html và README.md)

      - name: Bước 4: Đẩy thẳng lên máy chủ GitHub Pages công khai 🚀
        id: deployment
        uses: actions/deploy-pages@v4
        
